<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Presentación</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/black.css" id="theme">

    <style>
      /* Ajustes para look "moderno" */
      .reveal { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Arial, sans-serif; }
      .reveal h1, .reveal h2 { letter-spacing: -0.02em; }
      .reveal section { text-align: left; }
    </style>
  </head>

  <body>
    <div class="reveal">
      <div class="slides">
        <section data-markdown="slides.md"
                 data-separator="^\r?\n---\r?\n$"
                 data-separator-vertical="^\r?\n--\r?\n$"
                 data-separator-notes="^Note:">
        </section>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/markdown/markdown.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/notes/notes.js"></script>

    <script>
      Reveal.initialize({
        hash: true,
        plugins: [ RevealMarkdown, RevealNotes ],
        slideNumber: true,
        transition: "fade"
      });
    </script>
  </body>
</html>
