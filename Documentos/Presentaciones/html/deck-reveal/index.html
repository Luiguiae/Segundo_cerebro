<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Segundo Cerebro: de notas sueltas a sistema de pensamiento con IA</title>

    <!-- Reveal.js Core -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/black.css" id="theme">
    
    <!-- Custom Glassmorphism Theme -->
    <link rel="stylesheet" href="assets/css/theme.css">
  </head>

  <body>
    <div class="reveal">
      <div class="slides">
        <section data-markdown="slides.md"
                 data-separator="^\r?\n---\r?\n$"
                 data-separator-vertical="^\r?\n--\r?\n$"
                 data-separator-notes="^Note:">
        </section>
      </div>
    </div>

    <!-- Navigation Dots Container -->
    <div class="nav-dots" id="navDots"></div>

    <!-- Reveal.js Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/markdown/markdown.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/notes/notes.js"></script>

    <script>
      Reveal.initialize({
        hash: true,
        controls: false,
        progress: false,
        slideNumber: true,
        center: true,
        margin: 0.05,
        transition: 'fade',
        backgroundTransition: 'fade',
        width: '100%',
        height: '100%',
        
        // Markdown separators
        plugins: [ RevealMarkdown, RevealNotes ],
        markdown: {
          separator: '^---$',
          separatorVertical: '^--$',
          smartypants: true
        }
      });

      // Navigation Dots - Vertical
      function initNavDots() {
        const navDotsContainer = document.getElementById('navDots');
        const slides = Reveal.getSlides();
        
        // Create dots
        slides.forEach((slide, index) => {
          const dot = document.createElement('div');
          dot.className = 'nav-dot';
          dot.setAttribute('data-slide-index', index);
          dot.addEventListener('click', () => {
            Reveal.slide(index);
          });
          navDotsContainer.appendChild(dot);
        });
        
        // Update active dot on slide change
        function updateActiveDot() {
          const currentIndex = Reveal.getIndices().h;
          const dots = navDotsContainer.querySelectorAll('.nav-dot');
          dots.forEach((dot, index) => {
            if (index === currentIndex) {
              dot.classList.add('active');
            } else {
              dot.classList.remove('active');
            }
          });
        }
        
        Reveal.on('slidechanged', updateActiveDot);
        updateActiveDot(); // Initial state
      }
      
      // Initialize dots after Reveal is ready
      Reveal.on('ready', initNavDots);
    </script>
  </body>
</html>
