<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>JARVIS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #00ff41;
      font-family: 'IBM Plex Mono', monospace;
      width: 400px;
      height: 600px;
      overflow: hidden;
      user-select: none;
      display: flex;
      flex-direction: column;
      padding: 24px 20px 16px;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 5px;
      color: #00ff41;
    }

    .ws-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 8px;
      color: #1f6b1f;
      letter-spacing: 1px;
    }

    .ws-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #1f6b1f;
      transition: background 0.3s;
    }

    .ws-dot.connected { background: #00ff41; animation: dot-blink 2s infinite; }

    @keyframes dot-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Animation area ─────────────────────────────────────────────────── */

    .anim-wrap {
      flex: 0 0 188px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 6px 0 0;
    }

    svg { width: 188px; height: 188px; overflow: visible; }

    /* ── State label ────────────────────────────────────────────────────── */

    .state-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-align: center;
      margin: 8px 0 4px;
      min-height: 14px;
      transition: color 0.25s;
    }

    /* ── Message ────────────────────────────────────────────────────────── */

    .message {
      font-size: 11px;
      text-align: center;
      min-height: 32px;
      line-height: 1.55;
      padding: 0 16px;
      margin-bottom: 10px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      transition: color 0.25s;
      color: #2d7a2d;
    }

    /* ── Timer ──────────────────────────────────────────────────────────── */

    .timer-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 0 4px;
      margin-bottom: 10px;
    }

    .timer-label {
      font-size: 8px;
      letter-spacing: 2px;
      color: #1f6b1f;
      text-transform: uppercase;
    }

    .timer {
      font-size: 14px;
      font-weight: 600;
      color: #44aa44;
      min-width: 72px;
    }

    /* ── Divider ────────────────────────────────────────────────────────── */

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #1a3a1a 30%, #1a3a1a 70%, transparent);
      margin-bottom: 10px;
    }

    /* ── Log ────────────────────────────────────────────────────────────── */

    .log-header {
      font-size: 8px;
      letter-spacing: 2px;
      color: #1f6b1f;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    .log-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }

    .log-item {
      font-size: 10px;
      color: #2d7a2d;
      display: flex;
      align-items: flex-start;
      gap: 7px;
      line-height: 1.3;
    }

    .log-time { color: #1a4a1a; flex-shrink: 0; font-size: 9px; }

    .log-msg {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      max-width: 280px;
    }

    .log-item.fresh { animation: log-fresh 2.5s ease-out forwards; }

    @keyframes log-fresh {
      0%   { color: #00ff41; }
      100% { color: #2d7a2d; }
    }
  </style>
</head>
<body>

  <div class="header">
    <span class="title">J A R V I S</span>
    <div class="ws-indicator">
      <div class="ws-dot" id="wsDot"></div>
      <span id="wsLabel">offline</span>
    </div>
  </div>

  <div class="anim-wrap">
    <svg id="svgAnim" viewBox="0 0 180 180">
      <g id="animGroup"></g>
    </svg>
  </div>

  <div class="state-label" id="stateLabel">IDLE</div>
  <div class="message"     id="message">Esperando wake word...</div>

  <div class="timer-row">
    <span class="timer-label">tiempo</span>
    <span class="timer" id="timer">—</span>
  </div>

  <div class="divider"></div>
  <div class="log-header">▸ acciones recientes</div>
  <ul class="log-list" id="logList"></ul>

<script>
// ── State definitions ─────────────────────────────────────────────────────────

const STATES = {
  idle: {
    label: 'IDLE',
    color: '#1a6b1a',
    msgColor: '#2d7a2d',
    svg: `
      <circle fill="none" stroke="#0d3d0d" stroke-width="1.5" cx="90" cy="90" r="68">
        <animate attributeName="r"       values="64;72;64" dur="3s" repeatCount="indefinite" begin="0.5s"/>
        <animate attributeName="opacity" values="0.25;0.6;0.25" dur="3s" repeatCount="indefinite" begin="0.5s"/>
      </circle>
      <circle fill="none" stroke="#1a5c1a" stroke-width="2" cx="90" cy="90" r="50">
        <animate attributeName="r"       values="47;55;47" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle fill="#1a5c1a" cx="90" cy="90" r="6">
        <animate attributeName="r"       values="5;8;5" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
      </circle>
    `,
  },

  escuchando: {
    label: 'ESCUCHANDO',
    color: '#00ff41',
    msgColor: '#00ff41',
    svg: `
      <circle fill="none" stroke="#00ff41" stroke-width="2" cx="90" cy="90">
        <animate attributeName="r"       values="10;72;10" dur="1.8s" repeatCount="indefinite" begin="0s"/>
        <animate attributeName="opacity" values="0.9;0;0.9"  dur="1.8s" repeatCount="indefinite" begin="0s"/>
      </circle>
      <circle fill="none" stroke="#00ff41" stroke-width="1.5" cx="90" cy="90">
        <animate attributeName="r"       values="10;72;10" dur="1.8s" repeatCount="indefinite" begin="0.45s"/>
        <animate attributeName="opacity" values="0.9;0;0.9"  dur="1.8s" repeatCount="indefinite" begin="0.45s"/>
      </circle>
      <circle fill="none" stroke="#00ff41" stroke-width="1" cx="90" cy="90">
        <animate attributeName="r"       values="10;72;10" dur="1.8s" repeatCount="indefinite" begin="0.9s"/>
        <animate attributeName="opacity" values="0.9;0;0.9"  dur="1.8s" repeatCount="indefinite" begin="0.9s"/>
      </circle>
      <circle fill="none" stroke="#00ff41" stroke-width="0.5" cx="90" cy="90">
        <animate attributeName="r"       values="10;72;10" dur="1.8s" repeatCount="indefinite" begin="1.35s"/>
        <animate attributeName="opacity" values="0.9;0;0.9"  dur="1.8s" repeatCount="indefinite" begin="1.35s"/>
      </circle>
      <circle fill="#00ff41" cx="90" cy="90">
        <animate attributeName="r" values="7;12;7" dur="0.7s" repeatCount="indefinite"/>
      </circle>
    `,
  },

  procesando: {
    label: 'PROCESANDO',
    color: '#f59e0b',
    msgColor: '#d4891a',
    svg: `
      <circle fill="none" stroke="#1a1400" stroke-width="1.5" cx="90" cy="90" r="50"/>
      <circle fill="none" stroke="#f59e0b" stroke-width="2.5"
        stroke-dasharray="80 234" cx="90" cy="90" r="50"
        transform-origin="90 90">
        <animateTransform attributeName="transform" type="rotate"
          from="0 90 90" to="360 90 90" dur="1.1s" repeatCount="indefinite"/>
      </circle>
      <circle fill="none" stroke="#f59e0b" stroke-width="1"
        stroke-dasharray="25 289" cx="90" cy="90" r="50" opacity="0.35"
        transform-origin="90 90">
        <animateTransform attributeName="transform" type="rotate"
          from="180 90 90" to="540 90 90" dur="1.9s" repeatCount="indefinite"/>
      </circle>
      <circle fill="none" stroke="#f59e0b" stroke-width="1.5" cx="90" cy="90" r="20">
        <animate attributeName="r"       values="16;24;16" dur="1.1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.2;0.5;0.2" dur="1.1s" repeatCount="indefinite"/>
      </circle>
      <circle fill="#f59e0b" cx="90" cy="90" r="7" opacity="0.7"/>
    `,
  },

  ejecutando: {
    label: 'EJECUTANDO',
    color: '#f97316',
    msgColor: '#c45d10',
    svg: `
      <circle fill="none" stroke="#180900" stroke-width="7" cx="90" cy="90" r="55"/>
      <circle fill="none" stroke="#f97316" stroke-width="7" stroke-linecap="round"
        cx="90" cy="90" r="55"
        stroke-dasharray="345" stroke-dashoffset="345"
        transform="rotate(-90 90 90)">
        <animate attributeName="stroke-dashoffset"
          values="345;0;0;345" dur="2.8s" repeatCount="indefinite"
          keyTimes="0;0.55;0.8;1"
          calcMode="spline"
          keySplines="0.4 0 0.2 1; 0 0 1 1; 0.4 0 0.2 1"/>
      </circle>
      <circle fill="none" stroke="#f97316" stroke-width="1.5" cx="90" cy="90" r="30" opacity="0.2">
        <animate attributeName="r" values="28;34;28" dur="1.4s" repeatCount="indefinite"/>
      </circle>
      <text x="90" y="96" text-anchor="middle" fill="#f97316"
        font-family="IBM Plex Mono" font-size="20" font-weight="700">⚡</text>
    `,
  },

  respondiendo: {
    label: 'RESPONDIENDO',
    color: '#3b82f6',
    msgColor: '#5a9cf0',
    svg: `
      <circle fill="none" stroke="#3b82f6" stroke-width="2" cx="90" cy="90">
        <animate attributeName="r"       values="18;70;18" dur="1.1s" repeatCount="indefinite" begin="0s"/>
        <animate attributeName="opacity" values="0.8;0;0.8"  dur="1.1s" repeatCount="indefinite" begin="0s"/>
      </circle>
      <circle fill="none" stroke="#3b82f6" stroke-width="1.5" cx="90" cy="90">
        <animate attributeName="r"       values="18;70;18" dur="1.1s" repeatCount="indefinite" begin="0.28s"/>
        <animate attributeName="opacity" values="0.8;0;0.8"  dur="1.1s" repeatCount="indefinite" begin="0.28s"/>
      </circle>
      <circle fill="none" stroke="#3b82f6" stroke-width="1" cx="90" cy="90">
        <animate attributeName="r"       values="18;70;18" dur="1.1s" repeatCount="indefinite" begin="0.56s"/>
        <animate attributeName="opacity" values="0.8;0;0.8"  dur="1.1s" repeatCount="indefinite" begin="0.56s"/>
      </circle>
      <circle fill="#3b82f6" cx="90" cy="90">
        <animate attributeName="r" values="14;20;14" dur="0.55s" repeatCount="indefinite"/>
      </circle>
    `,
  },

  watcher: {
    label: 'WATCHER',
    color: '#8b5cf6',
    msgColor: '#a07ae0',
    svg: `
      <circle fill="none" stroke="#1e1040" stroke-width="2" cx="90" cy="90" r="50"/>
      <circle fill="none" stroke="#8b5cf6" stroke-width="2"
        stroke-dasharray="314" stroke-dashoffset="314"
        cx="90" cy="90" r="50" transform="rotate(-90 90 90)">
        <animate attributeName="stroke-dashoffset" values="314;0" dur="0.5s" fill="freeze"/>
      </circle>
      <circle fill="#8b5cf6" cx="90" cy="90">
        <animate attributeName="r"       values="15;22;15" dur="0.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;1;0.6"  dur="0.6s" repeatCount="indefinite"/>
      </circle>
      <circle fill="none" stroke="#8b5cf6" stroke-width="1" cx="90" cy="90" r="34" opacity="0.3">
        <animate attributeName="r" values="30;38;30" dur="0.6s" repeatCount="indefinite"/>
      </circle>
      <text x="90" y="96" text-anchor="middle" fill="#0a0a0a"
        font-family="IBM Plex Mono" font-size="17">👁</text>
    `,
  },
};

// ── DOM refs ──────────────────────────────────────────────────────────────────

const animGroup  = document.getElementById('animGroup');
const stateLabel = document.getElementById('stateLabel');
const messageEl  = document.getElementById('message');
const timerEl    = document.getElementById('timer');
const logList    = document.getElementById('logList');
const wsDot      = document.getElementById('wsDot');
const wsLabel    = document.getElementById('wsLabel');

// ── State machine ─────────────────────────────────────────────────────────────

let currentState = 'idle';
let stateStart   = Date.now();
let actionLog    = [];
let _stuckTimer  = null;
const STUCK_MS   = 90_000; // vuelve a idle si lleva 90s sin actualización

function applyState(tipo, mensaje) {
  if (_stuckTimer) { clearTimeout(_stuckTimer); _stuckTimer = null; }

  const cfg = STATES[tipo] || STATES.idle;
  currentState     = tipo;
  stateStart       = Date.now();

  animGroup.innerHTML      = cfg.svg;
  stateLabel.textContent   = cfg.label;
  stateLabel.style.color   = cfg.color;
  messageEl.textContent    = mensaje || '';
  messageEl.style.color    = cfg.msgColor;

  // Cubre todos los estados no-idle: si el daemon muere a mitad de cualquier
  // operación (no solo ejecutando/procesando), el dashboard no debe quedar pegado.
  if (['ejecutando', 'procesando', 'escuchando', 'respondiendo', 'watcher'].includes(tipo)) {
    _stuckTimer = setTimeout(() => applyState('idle', 'Esperando wake word...'), STUCK_MS);
  }
}

function pushLog(tipo, mensaje, ts) {
  const d    = ts ? new Date(ts) : new Date();
  const time = d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  actionLog.unshift({ time, tipo: tipo.toUpperCase(), msg: (mensaje || '').slice(0, 52) });
  if (actionLog.length > 5) actionLog.pop();

  // Construcción via DOM + textContent (no innerHTML con template string): mensaje/time
  // vienen de transcripciones de voz o nombres de archivo — pueden contener '<'/'>'/'&'.
  logList.textContent = '';
  actionLog.forEach((l, i) => {
    const li = document.createElement('li');
    li.className = 'log-item' + (i === 0 ? ' fresh' : '');

    const timeSpan = document.createElement('span');
    timeSpan.className = 'log-time';
    timeSpan.textContent = l.time;

    const msgSpan = document.createElement('span');
    msgSpan.className = 'log-msg';
    msgSpan.textContent = '› ' + l.msg;

    li.appendChild(timeSpan);
    li.appendChild(msgSpan);
    logList.appendChild(li);
  });
}

// ── Timer ─────────────────────────────────────────────────────────────────────

const LOG_STATES = new Set(['ejecutando', 'procesando', 'escuchando', 'respondiendo', 'watcher']);

setInterval(() => {
  if (currentState === 'idle') { timerEl.textContent = '—'; return; }
  const ms = Date.now() - stateStart;
  const s  = Math.floor(ms / 1000);
  const m  = Math.floor(s / 60);
  const d  = Math.floor((ms % 1000) / 100);
  timerEl.textContent = m > 0
    ? `${String(m).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}.${d}s`
    : `${String(s).padStart(2,'0')}.${d}s`;
}, 100);

// ── WebSocket ─────────────────────────────────────────────────────────────────

function connect() {
  let ws;
  try { ws = new WebSocket('ws://localhost:7778'); }
  catch(e) { setTimeout(connect, 3000); return; }

  ws.onopen = () => {
    wsDot.classList.add('connected');
    wsLabel.textContent = 'online';
  };

  ws.onmessage = (e) => {
    const { tipo, mensaje, timestamp } = JSON.parse(e.data);
    applyState(tipo, mensaje);
    if (LOG_STATES.has(tipo)) pushLog(tipo, mensaje, timestamp);
  };

  ws.onclose = () => {
    wsDot.classList.remove('connected');
    wsLabel.textContent = 'offline';
    setTimeout(connect, 2500);
  };

  ws.onerror = () => ws.close();
}

// ── Init ──────────────────────────────────────────────────────────────────────

applyState('idle', 'Esperando wake word...');
connect();
</script>
</body>
</html>
